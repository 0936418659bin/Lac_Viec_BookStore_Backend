# ===============================
# = APPLICATION CONFIGURATION
# ===============================
spring.application.name=bookstore-backend
server.port=8080
server.servlet.context-path=/api

# ===============================
# = DATABASE CONFIGURATION (PostgreSQL)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/Lac_Viet_BookStore?currentSchema=new_schema}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:0901178334bin}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Configuration
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.auto-commit=true

# ===============================
# = JPA / HIBERNATE
# ===============================
# Validate the schema, make sure it matches the entities
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false
spring.jpa.properties.javax.persistence.schema-generation.database.action=none

# ===============================
# = LOGGING CONFIGURATION
# ===============================
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

spring.jpa.properties.hibernate.default_schema=bookstore
spring.jpa.properties.hibernate.hbm2ddl.schema=new_schema
spring.jpa.properties.hibernate.search.default.directory_provider=filesystem
spring.jpa.properties.hibernate.search.default.indexBase=./target/lucene/indexes


# ===============================
# = FLYWAY CONFIGURATION
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=new_schema
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=true
spring.flyway.validate-migration-naming=true
spring.flyway.baseline-version=1
spring.flyway.placeholder-replacement=false

# ===============================
# = JWT CONFIGURATION
# ===============================
# JWT Configuration
# Sử dụng plain text secret (không cần base64)
# Độ dài tối thiểu 256-bit (32 ký tự) cho HS256
app.jwt.secret=${APP_JWT_SECRET:bookStoreSecretKey12345678901234567890123456789012}
app.jwt.expirationMs=${APP_JWT_EXPIRATION_MS:86400000}
app.jwt.refreshExpirationMs=${APP_JWT_REFRESH_EXPIRATION_MS:604800000}
app.jwt.token-prefix=Bearer
app.jwt.header=Authorization
app.jwt.issuer=${APP_JWT_ISSUER:bookstore-backend}
app.jwt.audience=${APP_JWT_AUDIENCE:bookstore-client}

# ===============================
# = SECURITY CONFIGURATION
# ===============================
# Enable/disable user registration
security.registration.enabled=true
# Default user role for new registrations
security.default-user-role=USER

# ===============================
# = CORS CONFIGURATION
# ===============================
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=Authorization,Content-Type,Accept,Origin,X-Requested-With
cors.allow-credentials=true
cors.max-age=3600

# ===============================
# = FILE UPLOAD CONFIGURATION
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.dir=${FILE_UPLOAD_DIR:./uploads}
file.upload.allowed-extensions=jpg,jpeg,png,gif,webp
file.upload.max-images-per-product=10

# ===============================
# = LOGGING CONFIGURATION
# ===============================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.com.example.demo=DEBUG

# Log file configuration
logging.file.name=./logs/bookstore.log
logging.file.max-size=10MB
logging.file.max-history=30

# ===============================
# = ACTUATOR & MONITORING
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.info.enabled=true
management.endpoint.metrics.enabled=true

# Custom health indicators
management.health.redis.enabled=true
management.health.db.enabled=true
management.health.diskspace.enabled=true

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=5000ms

# Redis Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000  # 1 hour
spring.cache.redis.cache-null-values=false

# Enable Redis Repositories
spring.data.redis.repositories.enabled=true


# Application info
info.app.name=@project.name@
info.app.description=Bookstore Backend API
info.app.version=@project.version@
info.app.encoding=@project.build.sourceEncoding@
info.app.java.version=@java.version@

# ===============================
# = VALIDATION CONFIGURATION
# ===============================
# Enable validation
validation.enabled=true
# Custom validation messages
validation.messages.required=This field is required
validation.messages.email=Please enter a valid email address
validation.messages.password=Password must be at least 8 characters long
validation.messages.phone=Please enter a valid phone number

# ===============================
# = MISCELLANEOUS
# ===============================
spring.main.allow-bean-definition-overriding=true
# Jackson configuration for JSON
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# Server configuration
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# Timezone
spring.jpa.properties.hibernate.jdbc.time_zone=UTC



# Production profile settings
logging.level.root=WARN
logging.level.com.bookstore=INFO

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
security.registration.email-verification=true
security.password.strength=14

# Test profile settings
spring.config.activate.on-profile=test
logging.level.org.springframework.web=DEBUG
security.max-login-attempts=999
rate-limit.enabled=false